name: CodeRabbit

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]

jobs:
  coderabbit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run CodeRabbit AI Review
        uses: coderabbitai/coderabbit-action@v1
        with:
          # Basic configuration for CodeRabbit
          # Note: Full functionality requires installing the CodeRabbit GitHub App
          # from https://github.com/apps/coderabbitai
          ignore_paths: |
            *.md
            .gitignore
            *.json
          fail_on_high_severity: false
